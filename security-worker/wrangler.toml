name            = "bwrp-security-headers"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ── Routes ────────────────────────────────────────────────────────────────────
# Catches all bwrp.net traffic EXCEPT /api/* which is handled by bwrpauth.
# Cloudflare resolves routes by specificity: bwrp.net/api/* wins over bwrp.net/*
[[routes]]
pattern   = "bwrp.net/*"
zone_name = "bwrp.net"

# ── No bindings needed ────────────────────────────────────────────────────────
# This worker only transforms headers; it does not use D1, KV, or secrets.
