<!DOCTYPE html>
<html lang="de" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel | ATLANTIC Studios</title>
    <meta name="description" content="Internes Staff-Panel für ATLANTIC Studios Moderation und Teamverwaltung. Nur für autorisierte Mitarbeiter.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/assets/images/logo.png">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tac-dark':   '#08080a',
                        'tac-panel':  '#111114',
                        'tac-card':   '#16161a',
                        'tac-border': '#252529',
                        'tac-amber':  '#e2a800',
                        'tac-green':  '#10b981',
                        'tac-red':    '#ef4444',
                        'tac-blue':   '#3b82f6',
                        'tac-purple': '#a855f7',
                        'tac-muted':  '#71717a',
                        'bw-gold':    '#e2a800',
                    },
                    fontFamily: {
                        sans:    ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                        mono:    ['JetBrains Mono', 'monospace'],
                    },
                    backgroundImage: {
                        'grid-pattern': "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDEwIEwgNDAgMTAgTSAxMCAwIEwgMTAgNDAgTSAwIDIwIEwgNDAgMjAgTSAyMCAwIEwgMjAgNDAgTSAwIDMwIEwgNDAgMzAgTSAzMCAwIEwgMzAgNDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsIDI1NSwgMjU1LCAwLjAyNSkiIHN0cm9rZS13aWR0aD0iMSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNncmlkKSIvPjwvc3ZnPg==')",
                    },
                    keyframes: {
                        fadeIn:    { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideUp:   { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInR:  { '0%': { opacity: '0', transform: 'translateX(100%)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        slideOutR: { '0%': { opacity: '1', transform: 'translateX(0)' },   '100%': { opacity: '0', transform: 'translateX(100%)' } },
                        glitch:    { '0%,100%': { transform: 'translate(0)' }, '20%': { transform: 'translate(-2px,2px)' }, '40%': { transform: 'translate(2px,-2px)' }, '60%': { transform: 'translate(-1px,1px)' }, '80%': { transform: 'translate(1px,-1px)' } },
                        scanline:  { '0%': { backgroundPosition: '0 0' }, '100%': { backgroundPosition: '0 100%' } },
                    },
                    animation: {
                        'fade-in':    'fadeIn 0.3s ease-out',
                        'slide-up':   'slideUp 0.4s ease-out',
                        'slide-in-r': 'slideInR 0.3s ease-out',
                        'slide-out-r':'slideOutR 0.3s ease-in forwards',
                        'glitch':     'glitch 1s linear infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #08080a; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: #e2a800; }

        /* === CLIP PATHS === */
        .clip-tl  { clip-path: polygon(12px 0, 100% 0, 100% 100%, 0 100%, 0 12px); }
        .clip-br  { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%); }
        .clip-both{ clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px); }

        /* === HUD CORNERS === */
        .hud-corners { position: relative; }
        .hud-corners::before,
        .hud-corners::after { content: ''; position: absolute; width: 14px; height: 14px; border-color: #e2a800; border-style: solid; opacity: 0.5; }
        .hud-corners::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .hud-corners::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* === CRT SUBTLE === */
        .crt-overlay::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* === BRACKET HOVER EFFECT === */
        .bracket-hover { position: relative; transition: all 0.2s; }
        .bracket-hover::before { content: '['; position: absolute; left: 0; color: #e2a800; opacity: 0; transform: translateX(4px); transition: all 0.2s; }
        .bracket-hover::after  { content: ']'; position: absolute; right: 0; color: #e2a800; opacity: 0; transform: translateX(-4px); transition: all 0.2s; }
        .bracket-hover:hover::before { opacity: 1; transform: translateX(-10px); }
        .bracket-hover:hover::after  { opacity: 1; transform: translateX(10px); }

        /* === CURSOR BLINK === */
        .cursor-blink::after { content: '█'; color: #e2a800; animation: blink 1s step-start infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* === Selection === */
        ::selection { background: #e2a800; color: black; }

        /* === NAV ACTIVE GLOW === */
        .nav-active { box-shadow: inset 3px 0 0 #e2a800, inset 0 0 20px rgba(226,168,0,0.07); }

        /* === TOAST === */
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9998; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }

        /* === PULSE DOT === */
        .pulse-dot { position: relative; display: inline-flex; }
        .pulse-dot::before { content: ''; position: absolute; inset: 0; border-radius: 9999px; background: currentColor; opacity: 0.4; animation: ping 1s cubic-bezier(0,0,0.2,1) infinite; }
        @keyframes ping { 75%,100% { transform: scale(2); opacity: 0; } }
    </style>
</head>

<body class="bg-tac-dark text-zinc-300 font-sans h-screen overflow-hidden crt-overlay bg-grid-pattern">

    <!-- ================================================
         TOAST CONTAINER
    ================================================= -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- ================================================
         AUTH GATE
    ================================================= -->
    <div id="login-gate" class="fixed inset-0 z-50 flex items-center justify-center bg-tac-dark bg-grid-pattern">
        <!-- Ambient glow -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-tac-amber/5 rounded-full blur-3xl"></div>
        </div>

        <div class="relative w-full max-w-md px-6 py-10 hud-corners">
            <!-- Extra corner decorations -->
            <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-tac-amber opacity-50"></div>
            <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-tac-amber opacity-50"></div>

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border border-tac-border bg-tac-panel mb-5 relative">
                    <i data-lucide="shield-alert" class="w-9 h-9 text-tac-amber"></i>
                    <div class="absolute inset-0 rounded-full border border-tac-amber/20 animate-ping opacity-30"></div>
                </div>
                <h1 class="font-display text-3xl font-bold uppercase tracking-[0.2em] text-white">
                    ATLANTIC <span class="text-tac-amber">STUDIOS</span>
                </h1>
                <p class="font-mono text-[10px] text-tac-muted tracking-widest mt-1 cursor-blink" id="typewriter-el"></p>
            </div>

            <!-- Terminal Status Block -->
            <div class="bg-black/60 border border-tac-border p-4 font-mono text-xs mb-6" id="login-terminal">
                <p class="text-tac-green">&gt; SERVER: ONLINE</p>
                <p class="text-tac-green">&gt; VERBINDUNG: AUFGEBAUT</p>
                <p class="text-tac-amber mt-1">&gt; WARTE AUF OPERATOR-ZUGANGSDATEN...</p>
            </div>

            <!-- STEP 1: OAuth -->
            <div id="step-1">
                <button onclick="startRobloxOAuth()" id="btn-oauth"
                    class="w-full bg-white text-black font-display font-bold py-4 uppercase tracking-widest hover:bg-tac-amber transition-all flex items-center justify-center gap-3 clip-both group mb-3">
                    <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                    Mit Roblox anmelden
                </button>
                <p class="text-center font-mono text-[10px] text-tac-muted mt-2">
                    Rang-Anforderung: <span class="text-tac-amber">Game Mod+</span>
                </p>
            </div>

            <!-- STEP 2: Verifying animation -->
            <div id="step-2" class="hidden flex flex-col items-center justify-center space-y-4 py-6">
                <i data-lucide="loader-2" class="w-10 h-10 text-tac-amber animate-spin"></i>
                <p class="font-mono text-sm text-tac-amber cursor-blink" id="verify-text">AUTHENTIFIZIERUNG LÄUFT</p>
            </div>

            <!-- Status Messages -->
            <div id="status-msg" class="mt-5 text-xs font-mono hidden text-center"></div>
        </div>
    </div>

    <!-- ================================================
         MAIN DASHBOARD (dynamisch geladen)
    ================================================= -->
    <div id="dashboard" class="hidden h-screen w-full flex"></div>

    <!-- ================================================
         SCRIPTS
    ================================================= -->
    <script src="assets/js/i18n.js"></script>
    <script>
        // ===================================================
        // CONFIGURATION
        // ===================================================
        const GROUP_ID = 34246821;
        const ALLOWED_ROLES = [
            "Group Owner", "Ownership Team", "Projektleitung", "Projektverwaltung", "Management",
            "Teamverwaltung", "Head Administrator", "Administrator", "Junior Administrator",
            "Head Game Moderator", "Game Moderator"
        ];
        const REDIRECT_URI = 'https://bwrp.net/team';

        // ===================================================
        // DOM ELEMENTS
        // ===================================================
        const gate      = document.getElementById('login-gate');
        const step1     = document.getElementById('step-1');
        const step2     = document.getElementById('step-2');
        const statusMsg = document.getElementById('status-msg');
        const dashboard = document.getElementById('dashboard');

        // ===================================================
        // TYPEWRITER ON LOAD
        // ===================================================
        (function() {
            const text = 'SICHERER TERMINAL // ZUGANG BESCHRÄNKT';
            const el = document.getElementById('typewriter-el');
            el.textContent = '';
            let i = 0;
            function type() {
                if (i < text.length) { el.textContent += text[i++]; setTimeout(type, 45); }
            }
            setTimeout(type, 600);
        })();

        // Initialize icons
        lucide.createIcons();

        // ===================================================
        // TOAST NOTIFICATION SYSTEM
        // ===================================================
        function showToast(message, type = 'info', duration = 3500) {
            const container = document.getElementById('toast-container');
            const id = 'toast-' + Date.now();

            const colorMap = {
                success: 'border-tac-green text-tac-green bg-tac-card',
                error:   'border-tac-red   text-tac-red   bg-tac-card',
                info:    'border-tac-amber text-tac-amber bg-tac-card',
                warn:    'border-yellow-500 text-yellow-400 bg-tac-card',
            };
            const iconMap = {
                success: 'circle-check',
                error:   'circle-x',
                info:    'info',
                warn:    'triangle-alert',
            };

            const toast = document.createElement('div');
            toast.id = id;
            toast.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 border font-mono text-xs max-w-xs backdrop-blur-sm animate-slide-in-r ${colorMap[type] || colorMap.info}`;
            toast.innerHTML = `<i data-lucide="${iconMap[type] || 'info'}" class="w-4 h-4 flex-shrink-0"></i><span>${message}</span>`;

            container.appendChild(toast);
            lucide.createIcons({ nodes: [toast] });

            setTimeout(() => {
                toast.style.animation = 'slideOutR 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ===================================================
        // SESSION MANAGEMENT
        // ===================================================
        function saveSession(data) {
            localStorage.setItem('atlantic_staff_session', JSON.stringify({ ...data, timestamp: Date.now() }));
        }

        async function checkSession() {
            const raw = localStorage.getItem('atlantic_staff_session');
            if (!raw) return;
            try {
                const session = JSON.parse(raw);
                // Validate cookie with server; auto-refreshes token if needed
                let meData = null;
                try {
                    const res = await window.api.getMe();
                    meData = res.user;
                } catch(e) {
                    if (e?.status === 401) return; // api client already called logout()
                    // Network/server error – fall back to localStorage for offline resilience
                    const ONE_WEEK = 7 * 24 * 60 * 60 * 1000;
                    if (Date.now() - session.timestamp > ONE_WEEK) { logout(); return; }
                    enterDashboard(session.username, session.rank, session.avatarUrl);
                    return;
                }
                enterDashboard(
                    meData.username ?? session.username,
                    (meData.role ?? session.rank).toUpperCase(),
                    meData.avatar_url ?? session.avatarUrl,
                );
            } catch(e) {
                localStorage.removeItem('atlantic_staff_session');
            }
        }

        function logout() {
            window.api?.logout?.().catch(() => {});
            localStorage.removeItem('atlantic_staff_session');
            if (isShiftActive) stopShift(true);
            dashboard.classList.add('hidden');
            dashboard.innerHTML = '';
            gate.classList.remove('hidden');
            gate.style.opacity = '1';
            step1.classList.remove('hidden');
            step2.classList.add('hidden');
            statusMsg.classList.add('hidden');
        }

        // ===================================================
        // UI HELPERS
        // ===================================================
        function showStatus(msg, type = 'neutral') {
            statusMsg.textContent = msg;
            statusMsg.classList.remove('hidden', 'text-tac-red', 'text-tac-green', 'text-tac-amber', 'text-zinc-400', 'animate-pulse');
            const map = { error: 'text-tac-red', success: 'text-tac-green', loading: ['text-tac-amber', 'animate-pulse'] };
            if (Array.isArray(map[type])) map[type].forEach(c => statusMsg.classList.add(c));
            else if (map[type]) statusMsg.classList.add(map[type]);
            else statusMsg.classList.add('text-zinc-400');
        }

        // ===================================================
        // ENTER DASHBOARD
        // ===================================================
        async function enterDashboard(username, rank, avatarUrl) {
            try {
                const res = await fetch('assets/fragments/dashboard.html');
                if (!res.ok) throw new Error(`Fetch Error: ${res.status}`);
                const html = await res.text();
                if (!html) throw new Error('Dashboard-Fragment leer');

                dashboard.innerHTML = html;

                // Inject user data
                const avatarEl = document.getElementById('user-avatar');
                const nameEl   = document.getElementById('user-name');
                const rankEl   = document.getElementById('user-rank');
                if (avatarEl) avatarEl.src = avatarUrl;
                if (nameEl)   nameEl.textContent = username;
                if (rankEl)   rankEl.textContent = rank;

                // Reveal
                gate.style.transition = 'opacity 0.5s ease';
                gate.style.opacity = '0';
                setTimeout(() => gate.classList.add('hidden'), 500);
                dashboard.classList.remove('hidden');
                dashboard.classList.add('animate-fade-in');

                // Init
                if (typeof lucide !== 'undefined') lucide.createIcons();
                startClock();
                if (typeof initDashboardListeners === 'function') initDashboardListeners();
                if (!staffLoaded && typeof loadStaffHierarchy === 'function') {
                    loadStaffHierarchy().catch(e => console.error('Staff Fehler:', e));
                    if (typeof loadAnnouncements === 'function') loadAnnouncements();
                }
                if (typeof initDatabase === 'function') initDatabase().catch(e => console.error('DB Fehler:', e));

            } catch(e) {
                console.error('Dashboard-Ladefehler:', e);
                showStatus('DASHBOARD LADEFEHLER: ' + e.message, 'error');
            }
        }

        // ===================================================
        // SYSTEM CLOCK
        // ===================================================
        function startClock() {
            const el = document.getElementById('sys-time');
            if (!el) return;
            function tick() {
                el.textContent = new Date().toISOString().substring(11, 19) + ' UTC';
            }
            tick();
            setInterval(tick, 1000);
        }

        // ===================================================
        // DELAY HELPER (used by loadStaffHierarchy)
        // ===================================================
        const delay = ms => new Promise(r => setTimeout(r, ms));

        // ===================================================
        // TAB NAVIGATION (global, wird auch im Fragment genutzt)
        // ===================================================
        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block', 'animate-fade-in');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-tac-amber', 'nav-active');
                btn.classList.add('text-zinc-500');
            });
            const tab = document.getElementById(`tab-${tabId}`);
            if (tab) { tab.classList.remove('hidden'); tab.classList.add('block', 'animate-fade-in'); }
            const btn = document.querySelector(`.nav-btn[data-tab="${tabId}"]`);
            if (btn) { btn.classList.remove('text-zinc-500'); btn.classList.add('text-tac-amber', 'nav-active'); }

            // Mobile: close sidebar
            const sidebar = document.getElementById('sidebar');
            if (sidebar && window.innerWidth < 768) sidebar.classList.add('-translate-x-full');
        };

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) sidebar.classList.toggle('-translate-x-full');
        };

        // ===================================================
        // STAFF HIERARCHY CONFIG
        // ===================================================
        const HIERARCHY_CONFIG = [
            { containerId: 'container-pr', tierLabel: 'KOMMANDO', tierColor: '#ef4444', roles: ['Group Owner', 'Ownership Team', 'Projektleitung', 'Projektverwaltung'] },
            { containerId: 'container-hr', tierLabel: 'AUFSICHT', tierColor: '#e2a800', roles: ['Management', 'Teamverwaltung', 'Head Administrator', 'Administrator', 'Junior Administrator'] },
            { containerId: 'container-mr', tierLabel: 'FELD-TEAM', tierColor: '#10b981', roles: ['Head Game Moderator', 'Game Moderator'] },
        ];
        let staffLoaded = false;

        async function loadStaffHierarchy() {
            const loading = document.getElementById('staff-loading');
            const grid    = document.getElementById('staff-hierarchy-grid');
            const search  = document.getElementById('staff-search-container');
            if (!loading || !grid) return;

            loading.classList.remove('hidden');
            grid.classList.add('hidden');
            if (search) search.classList.add('hidden');

            try {
                const rolesData = await window.api.getGroupRoles();
                if (!rolesData?.roles) throw new Error('Ungültige Rollen-Daten');
                rolesData.roles.sort((a, b) => b.rank - a.rank);

                for (const config of HIERARCHY_CONFIG) {
                    const container = document.getElementById(config.containerId);
                    if (!container) continue;
                    container.innerHTML = '';
                    const categoryRoles = rolesData.roles.filter(r => config.roles.includes(r.name));

                    for (const role of categoryRoles) {
                        try {
                            await delay(200);
                            const membersData = await window.api.getGroupRoleUsers(role.id);
                            const members = membersData.data || [];
                            if (!members.length) continue;

                            const block = document.createElement('div');
                            block.className = 'mb-4';
                            block.innerHTML = `
                                <div class="bg-tac-dark border-l-2 border-[${config.tierColor}] px-3 py-2 mb-2 flex items-center justify-between">
                                    <span class="font-mono text-xs font-bold text-white uppercase tracking-wider">${role.name}</span>
                                    <span class="font-mono text-[10px] text-tac-muted">${members.length} OPS</span>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                                    ${members.map(m => `
                                        <div class="user-card group flex items-center gap-2 bg-tac-dark border border-tac-border p-2 hover:border-[${config.tierColor}]/60 transition-all cursor-default relative">
                                            <div class="w-9 h-9 bg-zinc-800 border border-tac-border overflow-hidden flex-shrink-0">
                                                <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${m.userId}&width=150&height=150&format=png"
                                                     class="w-full h-full object-cover opacity-80 grayscale group-hover:grayscale-0 transition-all"
                                                     loading="lazy"
                                                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNDc1NTY5IiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjEyIiBjeT0iOCIgcj0iNCIvPjxwYXRoIGQ9Ik02IDIxdjItYTQgNCAwIDAgMSA0LTRoNGE0IDQgMCAwIDEgNCA0djIiLz48L3N2Zz4='">
                                            </div>
                                            <div class="overflow-hidden flex-1">
                                                <p class="user-name font-mono text-[11px] font-bold text-zinc-200 truncate">${m.username}</p>
                                                <p class="font-mono text-[9px] text-tac-muted">ID: ${m.userId}</p>
                                            </div>
                                            <a href="https://www.roblox.com/users/${m.userId}/profile" target="_blank"
                                               class="opacity-0 group-hover:opacity-100 transition-opacity p-1 text-tac-muted hover:text-tac-amber"
                                               title="Profil öffnen">
                                                <i data-lucide="external-link" class="w-3 h-3"></i>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                            container.appendChild(block);
                        } catch(err) { console.warn('Mitglieder-Ladefehler:', role.name, err); }
                    }
                }
                staffLoaded = true;
                lucide.createIcons({ nodes: [grid] });
            } catch(err) {
                console.error('Hierarchie-Ladefehler:', err);
                if (grid) grid.insertAdjacentHTML('beforeend', `
                    <div class="col-span-full text-center text-tac-red font-mono text-xs p-4 border border-tac-red/20 bg-tac-red/5">
                        FEHLER BEIM LADEN DER MITARBEITERDATEN
                    </div>`);
            } finally {
                if (loading) loading.classList.add('hidden');
                if (grid)    grid.classList.remove('hidden');
                if (search)  search.classList.remove('hidden');
            }
        }

        window.filterStaff = function() {
            const filter = (document.getElementById('staff-search-input')?.value || '').toUpperCase();
            document.querySelectorAll('.user-card').forEach(card => {
                const name = card.querySelector('.user-name')?.textContent?.toUpperCase() || '';
                card.style.display = name.includes(filter) ? '' : 'none';
            });
        };

        // ===================================================
        // SHIFT TIMER
        // ===================================================
        let shiftInterval  = null;
        let shiftStartTime = null;
        let shiftTimeElap  = 0;
        let isShiftActive  = false;

        function updateTimerDisplay(reset = false) {
            let secs = reset ? 0 : isShiftActive
                ? Math.floor((Date.now() - shiftStartTime) / 1000)
                : shiftTimeElap;
            const h = String(Math.floor(secs / 3600)).padStart(2, '0');
            const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
            const s = String(secs % 60).padStart(2, '0');
            const el = document.getElementById('shift-timer-display');
            if (el) el.textContent = `${h}:${m}:${s}`;

            // SVG Progress Ring (seconds within current minute)
            const ring = document.getElementById('timer-progress');
            if (ring) {
                const pct = (secs % 60) / 60;
                ring.style.strokeDashoffset = 283 - 283 * pct;
            }

            // Shift Status Chip in header
            const chip = document.getElementById('shift-chip');
            if (chip) {
                if (isShiftActive) {
                    chip.textContent = 'IM DIENST';
                    chip.className = 'hidden md:flex items-center gap-1.5 font-mono text-[10px] text-tac-green tracking-wider px-2 py-1 border border-tac-green/30 bg-tac-green/10';
                } else {
                    chip.textContent = 'AUS DIENST';
                    chip.className = 'hidden md:flex items-center gap-1.5 font-mono text-[10px] text-tac-muted tracking-wider px-2 py-1 border border-tac-border bg-tac-panel';
                }
            }
        }

        function saveShiftState() {
            const state = {
                active: isShiftActive,
                startTime: shiftStartTime,
                elapsed: isShiftActive ? Math.floor((Date.now() - shiftStartTime) / 1000) : shiftTimeElap,
                cases:   document.getElementById('shift-cases')?.value   || 0,
                bans:    document.getElementById('shift-bans')?.value    || 0,
                warns:   document.getElementById('shift-warns')?.value   || 0,
                kicks:   document.getElementById('shift-kicks')?.value   || 0,
                notes:   document.getElementById('shift-notes')?.value   || '',
            };
            localStorage.setItem('atlantic_shift_state', JSON.stringify(state));
        }

        function restoreShiftState() {
            const raw = localStorage.getItem('atlantic_shift_state');
            if (!raw) return;
            try {
                const state = JSON.parse(raw);
                isShiftActive  = state.active;
                shiftTimeElap  = state.elapsed || 0;

                if (document.getElementById('shift-cases')) document.getElementById('shift-cases').value = state.cases || 0;
                if (document.getElementById('shift-bans'))  document.getElementById('shift-bans').value  = state.bans  || 0;
                if (document.getElementById('shift-warns')) document.getElementById('shift-warns').value = state.warns || 0;
                if (document.getElementById('shift-kicks')) document.getElementById('shift-kicks').value = state.kicks || 0;
                if (document.getElementById('shift-notes')) document.getElementById('shift-notes').value = state.notes || '';

                if (isShiftActive) {
                    shiftStartTime = Date.now() - (shiftTimeElap * 1000);
                    shiftInterval = setInterval(updateTimerDisplay, 1000);
                    updateShiftButtons('active');
                } else {
                    if (shiftTimeElap > 0) updateShiftButtons('paused');
                    updateTimerDisplay();
                }
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch(e) { console.error('Shift-Status-Fehler:', e); }
        }

        window.toggleShift = function() {
            if (!isShiftActive) {
                isShiftActive = true;
                shiftStartTime = Date.now() - (shiftTimeElap * 1000);
                shiftInterval = setInterval(updateTimerDisplay, 1000);
                updateShiftButtons('active');
                window.api.startShift().catch(e => console.warn('[SHIFT] Start fehlgeschlagen:', e.message));
            } else {
                isShiftActive = false;
                clearInterval(shiftInterval);
                shiftTimeElap = Math.floor((Date.now() - shiftStartTime) / 1000);
                updateShiftButtons('paused');
            }
            updateTimerDisplay();
            saveShiftState();
            lucide.createIcons();
        };

        window.stopShift = function(force = false) {
            if (!force && !confirm('Schicht wirklich beenden? Die Zeit wird zurückgesetzt.')) return;

            // Persist shift metrics to D1 before resetting
            if (shiftStartTime) {
                const metrics = {
                    cases_count: parseInt(document.getElementById('shift-cases')?.value || 0),
                    bans_count:  parseInt(document.getElementById('shift-bans')?.value  || 0),
                    warns_count: parseInt(document.getElementById('shift-warns')?.value || 0),
                    kicks_count: parseInt(document.getElementById('shift-kicks')?.value || 0),
                    notes:       document.getElementById('shift-notes')?.value || null,
                };
                window.api.endShift(metrics).catch(e => console.warn('[SHIFT] End fehlgeschlagen:', e.message));
            }

            isShiftActive = false;
            clearInterval(shiftInterval);
            shiftStartTime = null;
            shiftTimeElap  = 0;
            updateTimerDisplay(true);
            updateShiftButtons('stopped');
            ['shift-cases','shift-bans','shift-warns','shift-kicks'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = 0;
            });
            const notes = document.getElementById('shift-notes');
            if (notes) notes.value = '';
            localStorage.removeItem('atlantic_shift_state');
            lucide.createIcons();
        };

        function updateShiftButtons(state) {
            const btnToggle = document.getElementById('btn-shift-start');
            const btnStop   = document.getElementById('btn-shift-stop');
            const statusInd = document.getElementById('shift-status-indicator');
            const statusTxt = document.getElementById('shift-status-text');

            if (!btnToggle) return;

            if (state === 'active') {
                btnToggle.innerHTML = '<i data-lucide="pause" class="w-4 h-4"></i> Pause';
                btnToggle.className = 'flex-1 bg-tac-amber/10 border border-tac-amber text-tac-amber font-mono font-bold py-3 hover:bg-tac-amber hover:text-black transition-all clip-both text-sm flex justify-center items-center gap-2';
                if (btnStop)   btnStop.disabled = false;
                if (statusInd) { statusInd.className = 'pulse-dot w-2.5 h-2.5 rounded-full bg-tac-green text-tac-green flex-shrink-0'; }
                if (statusTxt) { statusTxt.textContent = 'IM DIENST'; statusTxt.className = 'font-mono text-xs text-tac-green'; }
            } else if (state === 'paused') {
                btnToggle.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> Fortsetzen';
                btnToggle.className = 'flex-1 bg-tac-green/10 border border-tac-green text-tac-green font-mono font-bold py-3 hover:bg-tac-green hover:text-black transition-all clip-both text-sm flex justify-center items-center gap-2';
                if (btnStop)   btnStop.disabled = false;
                if (statusInd) { statusInd.className = 'w-2.5 h-2.5 rounded-full bg-tac-amber flex-shrink-0'; }
                if (statusTxt) { statusTxt.textContent = 'PAUSIERT'; statusTxt.className = 'font-mono text-xs text-tac-amber'; }
            } else {
                btnToggle.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> Starten';
                btnToggle.className = 'flex-1 bg-tac-green/10 border border-tac-green text-tac-green font-mono font-bold py-3 hover:bg-tac-green hover:text-black transition-all clip-both text-sm flex justify-center items-center gap-2';
                if (btnStop)   { btnStop.disabled = true; }
                if (statusInd) { statusInd.className = 'w-2.5 h-2.5 rounded-full bg-zinc-600 flex-shrink-0'; }
                if (statusTxt) { statusTxt.textContent = 'AUS DIENST'; statusTxt.className = 'font-mono text-xs text-tac-muted'; }
            }
        }

        window.copyShiftReport = function() {
            const time  = document.getElementById('shift-timer-display')?.textContent || '00:00:00';
            const cases = document.getElementById('shift-cases')?.value  || 0;
            const bans  = document.getElementById('shift-bans')?.value   || 0;
            const warns = document.getElementById('shift-warns')?.value  || 0;
            const kicks = document.getElementById('shift-kicks')?.value  || 0;
            const notes = document.getElementById('shift-notes')?.value  || '-';
            const user  = document.getElementById('user-name')?.textContent || 'Unbekannt';
            const rank  = document.getElementById('user-rank')?.textContent || '-';

            const report =
                `**👮 SCHICHT-BERICHT**\n` +
                `**Mitarbeiter:** ${user}\n` +
                `**Rang:** ${rank}\n` +
                `**Dauer:** ${time}\n` +
                `**Fälle bearbeitet:** ${cases}\n` +
                `**Bans erteilt:** ${bans}\n` +
                `**Verwarnungen:** ${warns}\n` +
                `**Kicks:** ${kicks}\n` +
                `**Notizen:** ${notes}`;

            navigator.clipboard.writeText(report)
                .then(() => showToast('Schichtbericht in Zwischenablage kopiert!', 'success'))
                .catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = report;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); showToast('Bericht kopiert!', 'success'); }
                    catch { showToast('Kopieren fehlgeschlagen.', 'error'); }
                    document.body.removeChild(ta);
                });
        };

        // ===================================================
        // METRIC ADJUSTMENT
        // ===================================================
        window.adjustMetric = function(id, delta) {
            const el = document.getElementById(id);
            if (!el) return;
            let val = parseInt(el.value || 0) + delta;
            if (val < 0) val = 0;
            el.value = val;
            saveShiftState();
        };

        // ===================================================
        // PUNISHMENT CALCULATOR
        // ===================================================
        const PUNISHMENT_DATA = {
            "RDM":         { label: "RDM (Zufälliger Angriff)",           data: ["Verwarnung / Kick", "Ban 3 Tage",       "Ban 7 Tage"       ] },
            "VDM":         { label: "VDM (Fahrzeug-Angriff)",             data: ["Verwarnung / Kick", "Ban 3 Tage",       "Ban 7 Tage"       ] },
            "Spawnkill":   { label: "Spawnkilling",                        data: ["Kick",              "Ban 3 Tage",       "Ban 7 Tage"       ] },
            "CombatLog":   { label: "Combat Logging",                      data: ["Ban 2 Tage",        "Ban 5 Tage",       "Ban 14 Tage"      ] },
            "FailRP":      { label: "FailRP",                              data: ["Verwarnung",        "Kick",             "Ban 3 Tage"       ] },
            "Metagaming":  { label: "Metagaming",                         data: ["Kick",              "Ban 3 Tage",       "Ban 7 Tage"       ] },
            "Powergaming": { label: "Powergaming",                        data: ["Kick",              "Ban 3 Tage",       "Ban 7 Tage"       ] },
            "NLR":         { label: "New Life Rule (NLR)",                data: ["Verwarnung",        "Kick",             "Ban 1 Tag"        ] },
            "Toxicity":    { label: "Toxizität / Beleidigungen",          data: ["Mute / Verwarnung", "Ban 1 Tag",        "Ban 7 Tage"       ] },
            "Spam":        { label: "Chat-Spam",                          data: ["Mute",              "Kick",             "Ban 1 Tag"        ] },
            "Advertising": { label: "Werbung",                            data: ["Permanenter Ban",   "Permanenter Ban",  "Permanenter Ban"  ] },
            "Exploiting":  { label: "Exploiting / Cheating",             data: ["Permanenter Ban",   "Permanenter Ban",  "Permanenter Ban"  ] },
        };

        window.runCalculation = function(offenseOverride) {
            const offense = offenseOverride || document.getElementById('calc-offense')?.value;
            const countRadio = document.querySelector('input[name="offense-count"]:checked');
            const resultEl   = document.getElementById('calc-result');
            const subtextEl  = document.getElementById('calc-subtext');
            const cmdEl      = document.getElementById('calc-command-output');
            const cmdBox     = document.getElementById('calc-command-box');

            if (!offense || !countRadio || !resultEl) return;

            const countIndex = parseInt(countRadio.value) - 1;
            const entry = PUNISHMENT_DATA[offense];
            if (!entry) return;

            const punishment = entry.data[countIndex];
            resultEl.textContent = punishment.toUpperCase();

            // Color-coding
            if (punishment.toLowerCase().includes('permanent')) {
                resultEl.className = 'font-display text-3xl md:text-4xl font-bold tracking-widest text-tac-red animate-glitch';
                if (subtextEl) { subtextEl.textContent = 'KRITISCHE MASSNAHME ERFORDERLICH'; subtextEl.className = 'font-mono text-xs text-tac-red mt-1'; }
            } else if (punishment.toLowerCase().includes('ban')) {
                resultEl.className = 'font-display text-3xl md:text-4xl font-bold tracking-widest text-tac-amber';
                if (subtextEl) { subtextEl.textContent = 'SUSPENDIERUNG PROTOKOLL'; subtextEl.className = 'font-mono text-xs text-tac-amber mt-1'; }
            } else {
                resultEl.className = 'font-display text-3xl md:text-4xl font-bold tracking-widest text-tac-green';
                if (subtextEl) { subtextEl.textContent = 'STANDARD-WARNUNG ERTEILT'; subtextEl.className = 'font-mono text-xs text-tac-green mt-1'; }
            }

            // Generate command
            const username  = document.getElementById('calc-username')?.value?.trim() || '[Username]';
            const countLbl  = ['1. Verstoß', '2. Verstoß', '3.+ Verstoß'][countIndex];
            const reason    = `${countLbl} – ${entry.label}`;
            const cmd       = `/moderate ${username} ${punishment} ${reason}`;
            if (cmdEl) cmdEl.value = cmd;
            if (cmdBox) cmdBox.classList.remove('hidden');

            // Quick offense selector highlight
            if (offenseOverride) {
                const sel = document.getElementById('calc-offense');
                if (sel) sel.value = offenseOverride;
            }
        };

        window.copyCalcCommand = function() {
            const el = document.getElementById('calc-command-output');
            if (!el || !el.value) return;
            navigator.clipboard.writeText(el.value)
                .then(() => showToast('Befehl kopiert!', 'success'))
                .catch(() => showToast('Kopieren fehlgeschlagen.', 'error'));
        };

        // ===================================================
        // QUICK MODERATOR TAB LOGIC
        // ===================================================
        let lookedUpPlayer = null; // { id, username } – set by lookupPlayer, used by generateQuickCommand

        window.lookupPlayer = async function() {
            const input = document.getElementById('lookup-input')?.value?.trim();
            if (!input) { showToast('Bitte Username oder ID eingeben.', 'warn'); return; }

            const result  = document.getElementById('lookup-result');
            const loading = document.getElementById('lookup-loading');
            lookedUpPlayer = null;
            if (result)  result.classList.add('hidden');
            if (loading) loading.classList.remove('hidden');
            document.getElementById('case-history-section')?.classList.add('hidden');

            try {
                const player = await window.api.lookupPlayer(input);

                if (loading) loading.classList.add('hidden');
                if (result)  result.classList.remove('hidden');

                const nameEl     = document.getElementById('lookup-username');
                const rankEl     = document.getElementById('lookup-rank');
                const avatarEl   = document.getElementById('lookup-avatar');
                const profileBtn = document.getElementById('lookup-profile-btn');

                if (nameEl)     nameEl.textContent = player.isBanned ? `${player.username} [GEBANNT]` : player.username;
                if (rankEl)     rankEl.textContent = `ID: ${player.id}`;
                if (avatarEl)   avatarEl.src = player.avatarUrl;
                if (profileBtn) profileBtn.href = player.profileUrl;

                // Store for case creation
                lookedUpPlayer = { id: String(player.id), username: player.username };

                // Load case history from D1
                renderCaseHistory(String(player.id));

                // Pre-fill username fields in other tabs
                const calcUser = document.getElementById('calc-username');
                if (calcUser) calcUser.value = player.username;
                const qmUser = document.getElementById('qm-username');
                if (qmUser) qmUser.value = player.username;

            } catch(e) {
                if (loading) loading.classList.add('hidden');
                showToast('Spieler-Lookup fehlgeschlagen: ' + (e.message || 'Unbekannter Fehler'), 'error');
                console.error(e);
            }
        };

        window.generateQuickCommand = function() {
            const username  = document.getElementById('qm-username')?.value?.trim()  || '[Username]';
            const offense   = document.getElementById('qm-offense')?.value;
            const count     = document.getElementById('qm-count')?.value || '1';
            const tridentEl = document.getElementById('qm-trident-output');
            const sapphEl   = document.getElementById('qm-sapphire-output');
            const cmdBoxEl  = document.getElementById('qm-command-box');

            if (!offense) { showToast('Bitte Vergehen auswählen.', 'warn'); return; }

            const entry = PUNISHMENT_DATA[offense];
            if (!entry) return;
            const countIndex = parseInt(count) - 1;
            const punishment = entry.data[Math.min(countIndex, entry.data.length - 1)];
            const countLbl   = ['1. Verstoß', '2. Verstoß', '3.+ Verstoß'][countIndex];
            const reason     = `${countLbl} – ${entry.label}`;

            const trident  = `/moderate ${username} ${punishment} ${reason}`;

            // Sapphire command mapping
            let sapphCmd = '';
            if (punishment.toLowerCase().includes('permanenter ban')) sapphCmd = `s!ban ${username} 0 ${reason}`;
            else if (punishment.toLowerCase().includes('ban')) {
                const days = punishment.match(/(\d+)/)?.[1] || '1';
                sapphCmd = `s!ban ${username} ${days}d ${reason}`;
            } else if (punishment.toLowerCase().includes('kick'))  sapphCmd = `s!kick ${username} ${reason}`;
            else if (punishment.toLowerCase().includes('mute'))    sapphCmd = `s!mute ${username} 2h ${reason}`;
            else                                                    sapphCmd = `s!warn ${username} ${reason}`;

            if (tridentEl) tridentEl.value = trident;
            if (sapphEl)   sapphEl.value   = sapphCmd;
            if (cmdBoxEl)  cmdBoxEl.classList.remove('hidden');

            // Persist moderation case to D1 if a player was looked up
            if (lookedUpPlayer) {
                let caseType = 'WARN';
                let durationDays;
                const p = punishment.toLowerCase();
                if (p.includes('permanenter ban')) { caseType = 'PERMBAN'; }
                else if (p.includes('ban')) {
                    caseType = 'BAN';
                    const m = punishment.match(/(\d+)/);
                    if (m) durationDays = parseInt(m[1]);
                } else if (p.includes('kick')) { caseType = 'KICK'; }

                window.api.createCase({
                    targetRobloxId: lookedUpPlayer.id,
                    targetUsername:  lookedUpPlayer.username,
                    type:            caseType,
                    reason,
                    ...(durationDays ? { durationDays } : {}),
                }).then(() => showToast('Fall in Datenbank gespeichert.', 'success'))
                  .catch(e => console.warn('[CASE] Speichern fehlgeschlagen:', e.message));
            }
        };

        window.copyQmCommand = function(type) {
            const el = document.getElementById(type === 'trident' ? 'qm-trident-output' : 'qm-sapphire-output');
            if (!el || !el.value) return;
            navigator.clipboard.writeText(el.value)
                .then(() => showToast(`${type === 'trident' ? 'Trident' : 'Sapphire'}-Befehl kopiert!`, 'success'))
                .catch(() => showToast('Kopieren fehlgeschlagen.', 'error'));
        };

        window.toggleChecklist = function(cb) {
            const fill = document.getElementById('checklist-fill');
            if (!fill) return;
            const total = document.querySelectorAll('.mod-check').length;
            const checked = document.querySelectorAll('.mod-check:checked').length;
            const pct = Math.round((checked / total) * 100);
            fill.style.width = pct + '%';
            fill.textContent = pct + '%';
            fill.className = `h-full font-mono text-[10px] flex items-center justify-end pr-2 transition-all duration-500 ${pct === 100 ? 'bg-tac-green text-black' : pct > 50 ? 'bg-tac-amber text-black' : 'bg-tac-blue text-white'}`;
        };

        window.resetChecklist = function() {
            document.querySelectorAll('.mod-check').forEach(cb => cb.checked = false);
            toggleChecklist();
        };

        // ===================================================
        // ANNOUNCEMENTS
        // ===================================================
        async function loadAnnouncements() {
            const feed = document.getElementById('announcements-feed');
            if (!feed) return;
            try {
                const res = await fetch(`assets/data/announcements.json?_t=${Date.now()}`);
                if (!res.ok) return;
                const data = await res.json();
                if (!Array.isArray(data) || !data.length) return;
                feed.innerHTML = '';
                feed.classList.remove('hidden');
                const colorMap = {
                    'KRITISCH': 'border-tac-red',
                    'UPDATE':   'border-tac-green',
                    'NEU':      'border-tac-green',
                    'INFO':     'border-tac-amber',
                    'WARN':     'border-yellow-500',
                    'FIX':      'border-tac-blue',
                };
                data.slice(0, 3).forEach(item => {
                    const el = document.createElement('div');
                    const borderClass = colorMap[item.badge] || 'border-tac-border';
                    el.className = `border-l-2 ${borderClass} pl-4 py-2 bg-tac-card border border-l-2 ${borderClass} border-tac-border`;
                    el.innerHTML = `
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-mono text-[10px] font-bold text-tac-muted">${item.badge || 'INFO'}</span>
                            <span class="font-mono text-[10px] text-tac-muted">${item.date}</span>
                        </div>
                        <p class="font-bold text-sm text-white">${item.title}</p>
                        <p class="font-mono text-xs text-tac-muted mt-1">${item.content}</p>
                    `;
                    feed.appendChild(el);
                });
            } catch(e) { console.warn('Ankündigungen fehlgeschlagen:', e); }
        }

        // ===================================================
        // INIT
        // ===================================================
        window.addEventListener('DOMContentLoaded', () => {
            checkOAuthCallback();
            checkSession();
        });

        window.initDashboardListeners = function() {
            ['shift-cases','shift-bans','shift-warns','shift-kicks'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', saveShiftState);
            });
            const notes = document.getElementById('shift-notes');
            if (notes) notes.addEventListener('input', saveShiftState);
            restoreShiftState();
            // Initial checklist state
            const fill = document.getElementById('checklist-fill');
            if (fill) toggleChecklist();
        };

        // ===================================================
        // ROBLOX OAUTH FLOW
        // ===================================================
        function startRobloxOAuth() {
            const CLIENT_ID = '1185800266267472506';
            const authUrl = `https://apis.roblox.com/oauth/v1/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=openid profile`;
            window.location.href = authUrl;
        }

        async function checkOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (!code) return;
            window.history.replaceState({}, document.title, window.location.pathname);

            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            showStatus('TOKEN WIRD AUSGETAUSCHT...', 'loading');

            try {
                // Exchange OAuth code via Worker – role check & session creation happen server-side
                const { ok, data } = await window.api.login(code, REDIRECT_URI);
                if (!ok) throw new Error(data?.error || 'OAuth-Handshake fehlgeschlagen');
                if (!data.success || !data.user) throw new Error('Ungültige OAuth-Antwort');

                const { id: targetUserId, username: targetUsername, role: userRole, avatarUrl } = data.user;

                showStatus('ZUGRIFF GEWÄHRT. WILLKOMMEN.', 'success');
                document.getElementById('verify-text').textContent = 'ZUGRIFF GEWÄHRT';
                saveSession({ userId: targetUserId, username: targetUsername, rank: userRole.toUpperCase(), avatarUrl });
                setTimeout(() => enterDashboard(targetUsername, userRole.toUpperCase(), avatarUrl), 1000);
            } catch(err) {
                console.error('OAuth-Fehler:', err);
                showStatus('ANMELDUNG FEHLGESCHLAGEN: ' + (err.message || 'Unbekannter Fehler'), 'error');
                resetLoginDelay();
            }
        }

        function resetLoginDelay() {
            setTimeout(() => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                statusMsg.classList.add('hidden');
            }, 4000);
        }
    </script>

                <div class="flex items-center gap-3 px-4 py-3 border-b border-tac-border">
                    <i data-lucide="search" class="w-4 h-4 text-tac-muted flex-shrink-0"></i>
                    <input id="cmd-input" type="text" placeholder="Befehl oder Tab suchen..."
                        class="flex-1 bg-transparent font-mono text-sm text-white placeholder:text-zinc-600 focus:outline-none"
                        oninput="filterPalette()" onkeydown="paletteKeyNav(event)">
                    <kbd class="font-mono text-[10px] text-tac-muted border border-tac-border px-1.5 py-0.5">ESC</kbd>
                </div>

                <!-- Results -->
                <ul id="cmd-list" class="max-h-80 overflow-y-auto py-2" role="listbox"></ul>

                <!-- Footer hint -->
                <div class="px-4 py-2 border-t border-tac-border flex items-center gap-4 font-mono text-[9px] text-tac-muted">
                    <span><kbd class="border border-tac-border px-1">↑↓</kbd> navigieren</span>
                    <span><kbd class="border border-tac-border px-1">↵</kbd> ausführen</span>
                    <span><kbd class="border border-tac-border px-1">ESC</kbd> schließen</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ====================================================
    // COMMAND PALETTE
    // ====================================================
    const PALETTE_ACTIONS = [
        { label: 'Übersicht',        icon: 'layout-dashboard', group: 'Navigation', action: () => showTab('home') },
        { label: 'Dienst-Terminal',  icon: 'clock',            group: 'Navigation', action: () => showTab('shift') },
        { label: 'Personalakte',     icon: 'users',            group: 'Navigation', action: () => showTab('roster') },
        { label: 'Aktions-Matrix',   icon: 'gavel',            group: 'Navigation', action: () => showTab('calculator') },
        { label: 'Schnellmoderator', icon: 'zap',              group: 'Navigation', action: () => showTab('quickmod') },
        { label: 'Server Intel',     icon: 'radar',            group: 'Navigation', action: () => { showTab('radar'); loadServerIntel(); } },
        { label: 'Richtlinien',      icon: 'book-open',        group: 'Navigation', action: () => showTab('rules') },
        { label: 'Befehlsreferenz',  icon: 'terminal',         group: 'Navigation', action: () => showTab('commands') },
        { label: 'Dienst starten',   icon: 'play',             group: 'Aktionen',   action: () => { showTab('shift'); if (!isShiftActive) toggleShift(); } },
        { label: 'Dienst pausieren', icon: 'pause',            group: 'Aktionen',   action: () => { if (isShiftActive) toggleShift(); } },
        { label: 'Dienst beenden',   icon: 'square',           group: 'Aktionen',   action: () => stopShift() },
        { label: 'Abmelden',         icon: 'log-out',          group: 'Aktionen',   action: () => logout() },
    ];

    let paletteIndex = -1;

    function openPalette() {
        const overlay = document.getElementById('cmd-palette');
        if (!overlay) return;
        overlay.classList.remove('hidden');
        const input = document.getElementById('cmd-input');
        if (input) { input.value = ''; input.focus(); }
        filterPalette();
    }

    function closePalette() {
        document.getElementById('cmd-palette')?.classList.add('hidden');
        paletteIndex = -1;
    }

    function filterPalette() {
        const q    = (document.getElementById('cmd-input')?.value || '').toLowerCase();
        const list = document.getElementById('cmd-list');
        if (!list) return;

        const filtered = PALETTE_ACTIONS.filter(a =>
            a.label.toLowerCase().includes(q) || a.group.toLowerCase().includes(q)
        );
        paletteIndex = filtered.length ? 0 : -1;

        // Group by category
        const groups = {};
        filtered.forEach(a => { (groups[a.group] = groups[a.group] || []).push(a); });

        list.innerHTML = '';
        let globalIdx = 0;
        Object.entries(groups).forEach(([grp, items]) => {
            const header = document.createElement('li');
            header.className = 'px-4 pt-2 pb-1 font-mono text-[9px] text-tac-muted tracking-widest uppercase';
            header.textContent = grp;
            list.appendChild(header);

            items.forEach(item => {
                const idx = globalIdx++;
                const li = document.createElement('li');
                li.className = `cmd-item flex items-center gap-3 px-4 py-2.5 font-mono text-sm cursor-pointer transition-colors ${idx === 0 ? 'bg-tac-amber/10 text-tac-amber' : 'text-zinc-300 hover:bg-white/5 hover:text-white'}`;
                li.setAttribute('data-idx', idx);
                li.setAttribute('role', 'option');
                li.innerHTML = `<i data-lucide="${item.icon}" class="w-4 h-4 flex-shrink-0 opacity-60"></i><span>${item.label}</span>`;
                li.onclick = () => { item.action(); closePalette(); };
                list.appendChild(li);
            });
        });

        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [list] });
    }

    function paletteKeyNav(e) {
        const items = document.querySelectorAll('.cmd-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') { e.preventDefault(); paletteIndex = Math.min(paletteIndex + 1, items.length - 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); paletteIndex = Math.max(paletteIndex - 1, 0); }
        else if (e.key === 'Enter') { e.preventDefault(); items[paletteIndex]?.click(); return; }
        else if (e.key === 'Escape') { closePalette(); return; }

        items.forEach((el, i) => {
            const active = i === paletteIndex;
            el.classList.toggle('bg-tac-amber/10', active);
            el.classList.toggle('text-tac-amber', active);
            el.classList.toggle('text-zinc-300', !active);
            if (active) el.scrollIntoView({ block: 'nearest' });
        });
    }

    // Global Ctrl+K listener (active after dashboard loads)
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            const palette = document.getElementById('cmd-palette');
            if (!palette) return;
            palette.classList.contains('hidden') ? openPalette() : closePalette();
        }
        if (e.key === 'Escape') closePalette();
    });

    // ====================================================
    // CASE HISTORY (rendered inside lookupPlayer)
    // ====================================================
    const CASE_TYPE_STYLE = {
        WARN:    { color: 'text-yellow-400', label: 'WARN' },
        KICK:    { color: 'text-orange-400', label: 'KICK' },
        BAN:     { color: 'text-red-400',    label: 'BAN'  },
        PERMBAN: { color: 'text-red-600',    label: 'PERM' },
    };

    async function renderCaseHistory(robloxId) {
        const section = document.getElementById('case-history-section');
        const list    = document.getElementById('case-history-list');
        const counter = document.getElementById('case-history-count');
        if (!section || !list) return;

        section.classList.remove('hidden');
        list.innerHTML = '<div class="font-mono text-[10px] text-tac-muted py-2 italic">Lade Akten...</div>';

        try {
            const { cases } = await window.api.getPlayerCases(robloxId);
            if (counter) counter.textContent = cases.length ? `${cases.length} Einträge` : '';

            if (!cases.length) {
                list.innerHTML = '<div class="font-mono text-[10px] text-tac-muted py-2 italic">Keine Einträge vorhanden.</div>';
                return;
            }

            list.innerHTML = cases.slice(0, 15).map(c => {
                const style = CASE_TYPE_STYLE[c.type] || { color: 'text-tac-muted', label: c.type };
                const date  = c.created_at ? new Date(c.created_at).toLocaleDateString('de-DE') : '?';
                const mod   = c.moderator_username ?? 'Unbekannt';
                const dur   = c.duration_days ? ` (${c.duration_days}d)` : '';
                return `
                <div class="border border-tac-border/60 bg-black/30 px-3 py-2 flex gap-2 items-start">
                    <span class="font-mono text-[9px] font-bold ${style.color} uppercase flex-shrink-0 mt-0.5 w-8">${style.label}${dur}</span>
                    <div class="flex-1 overflow-hidden">
                        <p class="font-mono text-[10px] text-zinc-200 truncate">${c.reason}</p>
                        <p class="font-mono text-[9px] text-tac-muted mt-0.5">${date} · ${mod}${c.active ? ' · <span class="text-tac-red">AKTIV</span>' : ''}</p>
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            list.innerHTML = `<div class="font-mono text-[10px] text-tac-red py-2">Fehler: ${e.message}</div>`;
        }
    }

    // ====================================================
    // SERVER INTEL (RADAR TAB)
    // ====================================================
    let radarInterval = null;

    window.loadServerIntel = async function() {
        const loading = document.getElementById('radar-loading');
        const grid    = document.getElementById('radar-grid');
        const errDiv  = document.getElementById('radar-error');
        const emptyDiv = document.getElementById('radar-empty');
        const summary = document.getElementById('radar-summary');
        const refreshBtn = document.getElementById('radar-refresh-btn');

        if (!loading) return; // tab not loaded yet

        [grid, errDiv, emptyDiv, summary].forEach(el => el?.classList.add('hidden'));
        loading.classList.remove('hidden');
        if (refreshBtn) refreshBtn.disabled = true;

        try {
            const { servers, totalPlayers, serverCount } = await window.api.getServers();
            loading.classList.add('hidden');

            if (!servers.length) {
                emptyDiv?.classList.remove('hidden');
                return;
            }

            // Summary bar
            const totalEl = document.getElementById('radar-total-players');
            const countEl = document.getElementById('radar-server-count');
            if (totalEl) totalEl.textContent = totalPlayers;
            if (countEl) countEl.textContent = serverCount;
            summary?.classList.remove('hidden');

            // Render cards
            if (grid) {
                grid.innerHTML = servers.map(s => {
                    const fillPct = Math.round((s.players / s.maxPlayers) * 100);
                    const fillColor = fillPct >= 90 ? 'bg-tac-red' : fillPct >= 60 ? 'bg-tac-amber' : 'bg-tac-green';
                    const pingColor = s.ping < 80 ? 'text-tac-green' : s.ping < 150 ? 'text-tac-amber' : 'text-tac-red';
                    const fpsColor  = s.fps  >= 55 ? 'text-tac-green' : s.fps  >= 30  ? 'text-tac-amber' : 'text-tac-red';
                    return `
                    <div class="bg-tac-panel border border-tac-border p-4 relative overflow-hidden group hover:border-tac-green/40 transition-colors">
                        <div class="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                            <i data-lucide="server" class="w-12 h-12 text-tac-green"></i>
                        </div>
                        <p class="font-mono text-[9px] text-tac-muted tracking-widest mb-3">SERVER #${s.index}</p>

                        <div class="flex items-end justify-between mb-3">
                            <div>
                                <p class="font-display text-2xl font-bold text-white">${s.players}<span class="text-tac-muted text-base">/${s.maxPlayers}</span></p>
                                <p class="font-mono text-[9px] text-tac-muted uppercase">Spieler</p>
                            </div>
                            <div class="text-right">
                                <p class="font-mono text-sm font-bold ${pingColor}">${s.ping}ms</p>
                                <p class="font-mono text-[9px] text-tac-muted">Ping</p>
                            </div>
                        </div>

                        <div class="w-full h-1 bg-tac-dark border border-tac-border/50 mb-3">
                            <div class="h-full ${fillColor} transition-all" style="width:${fillPct}%"></div>
                        </div>

                        <div class="flex justify-between font-mono text-[9px] text-tac-muted">
                            <span>FPS: <span class="${fpsColor} font-bold">${s.fps}</span></span>
                            <span class="text-[8px] truncate max-w-[100px] opacity-50">${s.jobId.substring(0, 8)}…</span>
                        </div>
                    </div>`;
                }).join('');
                grid.classList.remove('hidden');
                if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [grid] });
            }

            // Auto-refresh every 60s
            clearInterval(radarInterval);
            radarInterval = setInterval(() => {
                if (document.getElementById('tab-radar')?.classList.contains('block')) {
                    window.loadServerIntel();
                } else {
                    clearInterval(radarInterval);
                }
            }, 60000);

        } catch(e) {
            loading.classList.add('hidden');
            const errMsg = document.getElementById('radar-error-msg');
            if (errMsg) errMsg.textContent = e.message || 'SERVER NICHT ERREICHBAR';
            errDiv?.classList.remove('hidden');
        } finally {
            if (refreshBtn) refreshBtn.disabled = false;
        }
    };
    </script>
</body>

</html>
